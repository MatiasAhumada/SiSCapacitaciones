name: Deploy to VPS

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd SiSCapacitaciones/
            
            # Configurar git para resolver conflictos automáticamente
            git config pull.rebase false
            git config merge.ours.driver true
            
            # Hacer stash de cambios locales si existen
            git stash
            
            # Actualizar desde dev con estrategia theirs para package-lock
            git fetch origin dev
            git reset --hard origin/dev
            
            cd back
            npm install
            npm run build
            pm2 describe siscapacitaciones-api > /dev/null 2>&1 && pm2 restart siscapacitaciones-api || pm2 start dist/main.js --name siscapacitaciones-api
            pm2 save
            
            cd ../front
            rm -f package-lock.json
            npm install
            npm run build
            sudo mkdir -p /var/www/siscapacitaciones
            sudo rm -rf /var/www/siscapacitaciones/*
            sudo cp -r dist/* /var/www/siscapacitaciones/
            sudo chown -R www-data:www-data /var/www/siscapacitaciones
            
            cd ../titulos
            rm -f package-lock.json
            npm install
            npm run build
            sudo mkdir -p /var/www/titulos
            sudo rm -rf /var/www/titulos/*
            sudo cp -r dist/* /var/www/titulos/
            sudo chown -R www-data:www-data /var/www/titulos
